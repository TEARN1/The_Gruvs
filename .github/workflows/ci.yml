name: CI / Verify

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-and-verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build Check (Web)
        run: npx expo export -p web

  docker-verify:
    runs-on: ubuntu-latest
    needs: test-and-verify

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image (Verification)
        run: docker build -t the-gruvs:latest .
